<!doctype html>
<html lang="pt-br">
<head>
<title>Type text</title>
<meta charset="utf-8">
<link rel="stylesheet" type="text/css" href="css/estilo.css"/>
</head>
<body>
<h4>
<form>
<p>Escolha sua cor favorita:</p>
<input type="radio" id="vermelho" name="cor" value="vermelho">
<label for="vermelho">Vermelho</label><br>
<input type="radio" id="azul" name="cor" value="azul">
<label for="azul">Azul</label><br>
<input type="radio" id="verde" name="cor" value="verde">
<label for="verde">Verde</label><br>
<input type="radio" id="amarelo" name="cor" value="amarelo" checked>
<label for="amarelo">Amarelo (Padrão)</label>
</form>
</h4>
</body>
</html>
